<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Earbuds — QUICKPAPA</title>
  <meta name="description" content="Browse the full QUICKPAPA earbuds lineup: Pro, Air and Sport — premium sound at honest prices.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%237c5cff'/><text x='50' y='72' font-size='60' font-weight='800' text-anchor='middle' fill='%230a0a12' font-family='sans-serif'>Q</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="product">
  <div class="ambient"></div>
  <div id="layout-header"></div>

  <!-- CATALOG VIEW (no ?p) -->
  <section class="section" id="catalog-view">
    <div class="container">
      <div class="page-hero">
        <h1>QUICKPAPA earbuds</h1>
        <p>Premium sound, honest prices. Three models built for the way you listen.</p>
      </div>
      <div class="row gap" style="margin-bottom:32px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm filter-btn active" data-cat="all">All</button>
        <button class="btn btn-ghost btn-sm filter-btn" data-cat="Flagship">Flagship</button>
        <button class="btn btn-ghost btn-sm filter-btn" data-cat="Everyday">Everyday</button>
        <button class="btn btn-ghost btn-sm filter-btn" data-cat="Sport">Sport</button>
      </div>
      <div class="product-grid" id="catalog-grid"></div>
    </div>
  </section>

  <!-- PDP VIEW (with ?p) -->
  <section class="section" id="pdp-view" style="display:none">
    <div class="container">
      <h1 id="pdp-title" style="display:none"></h1>
      <div id="pdp-root"></div>
    </div>
  </section>

  <!-- RELATED -->
  <section class="section" id="related-view" style="display:none;padding-top:0">
    <div class="container">
      <div class="section-head left">
        <h2 style="font-size:1.8rem">You may also like</h2>
      </div>
      <div class="product-grid" id="related-grid"></div>
    </div>
  </section>

  <div id="layout-footer"></div>
  <script src="js/store.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const hasP = new URLSearchParams(location.search).has("p");
      document.getElementById("catalog-view").style.display = hasP ? "none" : "";
      document.getElementById("pdp-view").style.display = hasP ? "" : "none";
      if (hasP) {
        document.getElementById("related-view").style.display = "";
      }
    });
  </script>
</body>
</html>
